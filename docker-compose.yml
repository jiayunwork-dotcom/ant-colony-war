version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ant-war-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: ant-war-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    depends_on:
      - redis
    volumes:
      - ./backend/src:/app/backend/src
      - ./shared:/app/shared
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: ant-war-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./shared:/app/shared
    restart: unless-stopped

volumes:
  redis-data:
